
default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV["POSTGRES_HOST"] %>
  port: <%= ENV["POSTGRES_PORT"] %>
  username: <%= ENV["POSTGRES_USER"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: family_realm_development

test:
  <<: *default
  database: family_realm_test

production:
  <<: *default
  database: family_realm_production
  username: family_realm
  password: <%= ENV['FAMILY_REALM_DATABASE_PASSWORD'] %>
